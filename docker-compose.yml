  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"     # Wajib untuk verifikasi Let's Encrypt
      - "443:443"   # Wajib untuk jalur WSS (SSL)
      - "443:443/udp" # Wajib untuk ACME DNS-01 challenge
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - iot-network
    depends_on:
      # - mqtt
      - frontend
      - strapi
      - database

  database:
    image: timescale/timescaledb:latest-pg14
    container_name: database
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_IOT_NAME}
      - DB_STRAPI_NAME=${DB_STRAPI_NAME}
      - DB_STRAPI_USER=${DB_STRAPI_USER}
      - DB_STRAPI_PASS=${DB_STRAPI_PASS}
      #- POSTGRES_INITDB_ARGS=-c shared_preload_libraries=timescaledb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - iot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_IOT_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  #backend:
  #  build:
  #    context: ./backend
  #    dockerfile: Dockerfile
  #    cache_from:
  #      - iotproject_backend:latest
  #  image: iotproject_backend:latest
  #  container_name: backend
  #  ports:
  #    - "8000:8000"
  #  environment:
  #    - MQTT_HOST=mqtt
  #    - MQTT_PORT=1883
  #    - DB_USER=${DB_USER}
  #    - DB_PASS=${DB_PASS}
  #    - DB_NAME=${DB_IOT_NAME}
  #    - DB_HOST=database
  #    - DB_PORT=5432
  #    - SECRET_KEY=${BACKEND_SECRET_KEY}
  #    - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@database:5432/${DB_IOT_NAME}
  #  depends_on:
  #    database:
  #      condition: service_healthy
  #    mqtt:
  #      condition: service_started
  #  networks:
  #    - iot-network
  #  restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - iotproject_frontend:latest
      args:
        NEXT_PUBLIC_STRAPI_API_URL: ${NEXT_PUBLIC_STRAPI_API_URL}
    image: iotproject_frontend:latest
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_STRAPI_API_URL=${NEXT_PUBLIC_STRAPI_API_URL}
    depends_on:
      # - backend
      - strapi
    networks:
      - iot-network
    restart: unless-stopped
  
  strapi:
    image: doblenk/iotproject-strapi:latest  # ← Langsung dari DockerHub
    container_name: strapi
    env_file:
      - .env
    environment:
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=database
      - DATABASE_PORT=5432
      - DATABASE_NAME=${DB_STRAPI_NAME}
      - DATABASE_USERNAME=${DB_STRAPI_USER}
      - DATABASE_PASSWORD=${DB_STRAPI_PASS}
      - JWT_SECRET=${STRAPI_JWT_SECRET}
      - ADMIN_JWT_SECRET=${STRAPI_ADMIN_JWT_SECRET}
      - API_TOKEN_SALT=${STRAPI_API_TOKEN_SALT}
      - APP_KEYS=${STRAPI_APP_KEYS}
      - TRANSFER_TOKEN_SALT=${STRAPI_TRANSFER_TOKEN_SALT}
      - ENCRYPTION_KEY=${STRAPI_ENCRYPTION_KEY}
      - NODE_ENV=${STRAPI_NODE_ENV}
      - HOST=${STRAPI_HOST}
      - PORT=${STRAPI_PORT}
      - IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
    ports:
      - "1337:1337"
    volumes:
      - ./strapi/.cache:/srv/app/.cache
      - ./strapi/public/uploads:/srv/app/public/uploads
      - ./strapi/tmp:/srv/app/tmp
    depends_on:
      database:
        condition: service_healthy
    networks:
      - iot-network
    restart: unless-stopped

volumes:
  db_data:
    driver: local
  caddy_data:
  caddy_config:

networks:
  iot-network:
    driver: bridge
